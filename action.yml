name: repo-clarity
description: Run repo-clarity OSS doctor on a repository and optionally comment on PRs
branding:
  icon: book
  color: blue

inputs:
  path:
    description: Repository path to analyze
    required: false
    default: "."
  comment-on-pr:
    description: Post or update a PR comment with doctor results (pull_request events only)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - shell: bash
      run: |
        npm install -g repo-clarity@latest || npm install -g .
        repo-clarity doctor "${{ inputs.path }}" | tee doctor-output.txt
      env:
        INPUT_PATH: ${{ inputs.path }}
    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const output = fs.readFileSync('doctor-output.txt', 'utf8').slice(0, 60000);
          const body = `## repo-clarity OSS check\n\n\`\`\`\n${output}\n\`\`\``;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const marker = '## repo-clarity OSS check';
          const existing = comments.find((c) => c.body?.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
